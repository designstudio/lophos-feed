name: 🎬 Horror Test Suite

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'DRY RUN (simula sem salvar)?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  horror-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --omit=optional --ignore-scripts

      - name: 🎬 Run Horror Test Suite
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: node scripts/process-horror.mjs

      - name: 📊 Test Summary
        if: always()
        run: |
          echo "## 🎬 Horror Test Completed"
          echo "- Mode: ${{ github.event.inputs.dry_run == 'true' && '🟡 DRY RUN (simulado)' || '🟢 LIVE (salvo)' }}"
          echo "- Topic: horror (isolado)"
          echo "- Check logs above for clustering details"
